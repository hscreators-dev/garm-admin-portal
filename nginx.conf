# Garm Admin Portal frontend — SPA served under /garm-admin-portal/ + same-origin
# reverse-proxy to the admin backend so the browser talks to one origin (no CORS).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Admin backend (catalog/orders/settings/auth) → admin-backend :5050
  location /api/ {
    proxy_pass http://admin-backend:5050/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
    # SSE (live push) needs buffering off + long timeout
    proxy_buffering off;
    proxy_cache off;
  }

  # The app is built with base /garm-admin-portal/ — serve it there with SPA fallback.
  location /garm-admin-portal/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /garm-admin-portal/index.html;
  }

  location = / {
    return 302 /garm-admin-portal/;
  }
}
